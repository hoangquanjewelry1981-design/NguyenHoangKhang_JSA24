    <!-- Form liên hệ -->
    <div class="container bg-light">
        <div class="row justify-content-center align-items-center" style="min-height:100vh;">
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="text-center mb-4 title-contact">Liên hệ</h3>
                        <h4 class="text-center mb-4 title-contact">Liên hệ cùng chúng tôi</h4>
                        <form>
                            <div class="mb-3">
                                <label for="fname" class="form-label fw-bold"> Họ tên: </label> <br>
                                <input type="text" class="form-control" placeholder="Họ tên" id="fname" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold"> Email: </label> <br>
                                <input type="email" class="form-control" placeholder="Email" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="content" class="form-label fw-bold"> Nội dung: </label> <br>
                                <input type="text" class="form-control" placeholder="Nội dung" id="content" required>
                            </div>
                            <!-- Làm modal -->
                            <button class="btn btn-primary mt-3 w-100" type="button" data-bs-toggle="modal" data-bs-target="#myModal"> Gửi </button>
                            <!-- Tạo phần hiển thị cho nút bấm -->
                            <div class="modal fade" id="myModal" tabindex="-1">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <!-- Phần đầu -->
                                        <div class="modal-header">
                                            <h3 class="modal-title">Liên hệ</h3>
                                            <!-- Tạo nút "X" -->
                                            <button class="btn-close" type="button" data-bs-dismiss="modal"></button>
                                        </div>
                                        <!-- Phần body -->
                                        <div class="modal-body"> 
                                            Bạn đã gửi được ý kiến của mình
                                        </div>
                                        <!-- Nút "Đóng" -->
                                        <div class="modal-footer">
                                            <button class="btn btn-danger" type="button" data-bs-dismiss="modal">Đóng</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </form>
